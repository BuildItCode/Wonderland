<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #00ff88;
      --warn: #ffaa00;
      --error: #ff4444;
      --success: #22c55e;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    header .meta {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
    }

    section {
      margin-bottom: 2.5rem;
    }

    h2 {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .diagram-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2rem;
      overflow-x: auto;
    }

    .mermaid {
      display: flex;
      justify-content: center;
    }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
    }

    .task-card.done { border-left: 3px solid var(--success); }
    .task-card.blocked { border-left: 3px solid var(--error); }
    .task-card.in-progress { border-left: 3px solid var(--warn); }
    .task-card.pending { border-left: 3px solid var(--border); }

    .task-title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge.done { background: #052e1620; color: var(--success); border: 1px solid var(--success); }
    .badge.blocked { background: #2d000020; color: var(--error); border: 1px solid var(--error); }
    .badge.in-progress { background: #2d1a0020; color: var(--warn); border: 1px solid var(--warn); }
    .badge.pending { color: var(--muted); border: 1px solid var(--border); }

    .criteria-list {
      list-style: none;
    }

    .criteria-list li {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .criteria-list li:last-child { border-bottom: none; }

    .check { color: var(--success); }
    .cross { color: var(--error); }
    .pending-mark { color: var(--muted); }

    .stats-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1.25rem;
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
    }

    .file-list {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .file-list span::before { content: '+ '; color: var(--accent); }

    .decision-timeline {
      border-left: 1px solid var(--border);
      padding-left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .decision-entry {
      position: relative;
    }

    .decision-entry::before {
      content: '';
      position: absolute;
      left: -1.6rem;
      top: 0.4rem;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .decision-date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .decision-title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <span class="meta">{{DATE}} · {{TYPE}}</span>
  </header>

  <!-- CONTENT INJECTED BY VISUALIZE PHASE -->
  {{CONTENT}}

  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#1a1a2e',
        primaryTextColor: '#e8e8e8',
        primaryBorderColor: '#2a2a2a',
        lineColor: '#00ff88',
        secondaryColor: '#161616',
        tertiaryColor: '#0d0d0d',
        background: '#0d0d0d',
        mainBkg: '#161616',
        nodeBorder: '#2a2a2a',
        clusterBkg: '#161616',
        titleColor: '#e8e8e8',
        edgeLabelBackground: '#161616',
      }
    });
  </script>
</body>
</html>
